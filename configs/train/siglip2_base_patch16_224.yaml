model:
  model_root: /workspace/docker_share
  model_size: base
  model_patch: 16
  image_size: 224

dataset:
  train_txt: train.txt
  val_txt: val.txt
  labels_txt: labels.txt

training:
  batch_size: 64
  epochs: 20
  lr: 2e-5
  weight_decay: 1e-4

ml_decoder:
  query_num: 70

augmentation:
  randaugment: true
  cutout: true

loss:
  type: asl
  gamma_neg: 4

save:
  output_dir: outputs/siglip2_base_patch16_224